  <body>
    <p class="msg">Redirecting to today's syllable…</p>
    <script>
      // Deterministic UTC-day → syllable mapping. Knuth multiplicative
      // hash on the UTC day number gives a well-spread pick that never
      // lands on adjacent syllables two days in a row.
      (function () {
        var RANGE_START = 0xac00;
        var COUNT = 11172;
        var now = new Date();
        var dayUtc = Math.floor(
          Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) / 86400000,
        );
        // 2654435761 is floor(2^32 / phi); classic Knuth hash multiplier.
        var idx = Math.imul(dayUtc, 2654435761) >>> 0;
        idx = idx % COUNT;
        var cp = RANGE_START + idx;
        var hex = cp.toString(16).toUpperCase();
        location.replace("/#" + String.fromCodePoint(cp));
        document.title = String.fromCodePoint(cp) + " · U+" + hex + " · kongli.sh";
      })();
    </script>
    <noscript>
      <p>
        JavaScript is required to compute today's syllable. Pick any from
        <a href="/" style="color: #fff">kongli.sh</a>.
      </p>
    </noscript>
  </body>
